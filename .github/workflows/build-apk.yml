name: Build Blender Android APK

on:
  workflow_dispatch:
  # Trigger when BlenderMobile pushes new .a files
  repository_dispatch:
    types: [blender-libs-updated]

jobs:
  build:
    name: Build APK and strip libblender.so
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
      - name: Checkout Blender source (headers for APK compilation)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/Blender-android_arm64
          ref: blender-v3.6-release
          path: blender36
      - name: Checkout prebuilt libraries (lib-android_arm64)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/lib-android_arm64
          path: lib-android_arm64

      - name: Download Blender .a libraries
        uses: actions/download-artifact@v4
        with:
          name: blender-a-libraries
          path: blender-libs
          repository: apexmiguel9-hub/Blender3.6_arm64
          run-id: ${{ github.event.client_payload.run_id }}
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Copy .a files and patch CMakeLists.txt paths
        run: |
          set -ex
          WS=${{ github.workspace }}
          # Resolve the .cxx lib dir (src/main/cpp/../.cxx = .cxx)
          LIB_DIR="OBlender/app/.cxx/cmake/release/arm64-v8a/lib"
          mkdir -p "$LIB_DIR"
          cp blender-libs/libbf_*.a "$LIB_DIR/" 2>/dev/null || true
          cp blender-libs/libextern_*.a "$LIB_DIR/" 2>/dev/null || true
          cp blender-libs/libcycles_*.a "$LIB_DIR/" 2>/dev/null || true
          COUNT=$(find "$LIB_DIR" -name "*.a" | wc -l)
          echo "Copied $COUNT .a files to $LIB_DIR"
          # Verify a key file exists before Gradle runs
          ls -la "$LIB_DIR/libbf_modifiers.a" 2>/dev/null || echo "WARNING: libbf_modifiers.a not found at $LIB_DIR"
          echo "Build directory: $(pwd)"
          # Patch hardcoded Windows paths in CMakeLists.txt
          cd OBlender/app/src/main/cpp
          sed -i "s|D:/FreeProjects/Blender/Blender/Blender-android_arm64|$WS/blender36|g" CMakeLists.txt
          sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$WS/lib-android_arm64|g" CMakeLists.txt
          sed -i "s|D:/FreeProjects/Blender/Blender/Utilities-android_arm64/MakeBlender/app/\.cxx/cmake/release/arm64-v8a/|$WS/OBlender/app/.cxx/cmake/release/arm64-v8a/|g" CMakeLists.txt
          sed -i "s|D:/FreeProjects/Blender/Blender/Utilities-android_arm64/MakeBlender/app/\.cxx/cmake/debug/arm64-v8a/|$WS/OBlender/app/.cxx/cmake/debug/arm64-v8a/|g" CMakeLists.txt
          echo "CMakeLists.txt patched successfully"
          # Verify patched CMakeLists.txt has correct paths
          grep "blenderLibLibDirRelease" CMakeLists.txt
          grep "IMPORTED_LOCATION" CMakeLists.txt | head -3

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'


      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Gradle wrapper JAR
        run: |
          if [ ! -f OBlender/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found, downloading from Gradle 6.5 release..."
            curl -sL -o OBlender/gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v6.5.0/gradle/wrapper/gradle-wrapper.jar"
          fi

      - name: Make gradlew executable

        run: chmod +x OBlender/gradlew

      - name: Build Release APK
        working-directory: OBlender
        run: |
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Find and strip libblender.so
        run: |
          find . -name "libblender.so" -type f 2>/dev/null | while read so_file; do
            echo "Found: $so_file"
            echo "Size before strip: $(du -h "$so_file" | cut -f1)"
            ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded "$so_file"
            echo "Size after strip: $(du -h "$so_file" | cut -f1)"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blender-apk
          path: OBlender/app/build/outputs/apk/release/*.apk

      - name: Upload stripped libblender.so artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libblender-so-stripped
          path: |
            **/libblender.so
