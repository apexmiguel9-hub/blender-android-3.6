name: Build Blender Android APK

on:
  workflow_dispatch:
  # Trigger when BlenderMobile pushes new .a files
  repository_dispatch:
    types: [blender-libs-updated]

jobs:
  build:
    name: Build APK and strip libblender.so
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Download Blender .a libraries
        uses: actions/download-artifact@v4
        with:
          name: blender-a-libraries
          path: blender-libs
          repository: apexmiguel9-hub/Blender3.6_arm64
          run-id: ${{ github.event.client_payload.run_id }}
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Copy .a files to CMake lib directory
        run: |
          set -ex
          LIB_DIR="OBlender/app/src/main/cpp/../.cxx/cmake/release/arm64-v8a/lib"
          mkdir -p "$LIB_DIR"
          cp blender-libs/libbf_*.a "$LIB_DIR/" 2>/dev/null || true
          cp blender-libs/libextern_*.a "$LIB_DIR/" 2>/dev/null || true
          cp blender-libs/libcycles_*.a "$LIB_DIR/" 2>/dev/null || true
          COUNT=$(find "$LIB_DIR" -name "*.a" | wc -l)
          echo "Copied $COUNT .a files to $LIB_DIR"
          ls -la "$LIB_DIR" | head -20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 24
          ndk-version: r26b
          cmake-version: 3.22.1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Gradle wrapper JAR
        run: |
          if [ ! -f OBlender/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found, generating..."
            # Generate wrapper JAR in a temp dir (avoids project's build.gradle
            # which uses jcenter() - removed in Gradle 8+ on the runner)
            TMPDIR=$(mktemp -d)
            echo "" > "$TMPDIR/build.gradle"
            cd "$TMPDIR"
            gradle wrapper --gradle-version=6.5 2>&1
            cp gradle/wrapper/gradle-wrapper.jar \
              "$GITHUB_WORKSPACE/OBlender/gradle/wrapper/gradle-wrapper.jar"
            cd "$GITHUB_WORKSPACE"
            rm -rf "$TMPDIR"
          fi

      - name: Make gradlew executable

        run: chmod +x OBlender/gradlew

      - name: Build Release APK
        working-directory: OBlender
        run: |
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Find and strip libblender.so
        run: |
          find . -name "libblender.so" -type f 2>/dev/null | while read so_file; do
            echo "Found: $so_file"
            echo "Size before strip: $(du -h "$so_file" | cut -f1)"
            ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded "$so_file"
            echo "Size after strip: $(du -h "$so_file" | cut -f1)"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blender-apk
          path: OBlender/app/build/outputs/apk/release/*.apk

      - name: Upload stripped libblender.so artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libblender-so-stripped
          path: |
            **/libblender.so
