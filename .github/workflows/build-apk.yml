name: Build Blender Android APK

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Blender build run ID"
        required: false
        type: string
  repository_dispatch:
    types: [blender-libs-updated]

jobs:
  build:
    name: Build APK and strip libblender.so
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
      - name: Checkout Blender source (headers for APK compilation)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/Blender-android_arm64
          ref: blender-v3.6-release
          path: blender36
      - name: Checkout prebuilt libraries (lib-android_arm64)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/lib-android_arm64
          path: lib-android_arm64

      - name: Download Blender .a libraries
        uses: actions/download-artifact@v4
        with:
          name: blender-a-libraries
          path: blender-libs
          repository: apexmiguel9-hub/Blender3.6_arm64
          run-id: ${{ inputs.run_id || github.event.client_payload.run_id || '28250301432' }}
          github-token: ${{ secrets.GH_TOKEN }}

      - name: Copy .a files and patch CMakeLists.txt paths
        run: |
          set -ex
          WS=${{ github.workspace }}
          # Copy to a separate directory (NOT .cxx which Gradle may recreate)
          LIB_DIR="blender-static-libs"
          mkdir -p "$LIB_DIR"
          cp blender-libs/libbf_*.a "$LIB_DIR/" 2>/dev/null || true
          cp blender-libs/libextern_*.a "$LIB_DIR/" 2>/dev/null || true
          cp blender-libs/libcycles_*.a "$LIB_DIR/" 2>/dev/null || true
          COUNT=$(find "$LIB_DIR" -name "*.a" | wc -l)
          echo "Copied $COUNT .a files to $LIB_DIR"
          # Verify a key file exists
          ls -la "$LIB_DIR/libbf_modifiers.a"
          # Update CMakeLists.txt to point to our static dir
          cd OBlender/app/src/main/cpp
          sed -i "s|D:/FreeProjects/Blender/Blender/Blender-android_arm64|$WS/blender36|g" CMakeLists.txt
          sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$WS/lib-android_arm64|g" CMakeLists.txt
          # Replace the utilities/source/creator include path
          sed -i "s|D:/FreeProjects/Blender/Blender/Utilities-android_arm64/MakeBlender/app/\.cxx/cmake/release/arm64-v8a/source/creator|$WS/blender36/source/creator|g" CMakeLists.txt
          # Replace the lib dir with our blender-static-libs (NOT .cxx)
          sed -i "s|D:/FreeProjects/Blender/Blender/Utilities-android_arm64/MakeBlender/app/\.cxx/cmake/release/arm64-v8a/lib|$WS/blender-static-libs|g" CMakeLists.txt
          sed -i "s|D:/FreeProjects/Blender/Blender/Utilities-android_arm64/MakeBlender/app/\.cxx/cmake/debug/arm64-v8a/lib|$WS/blender-static-libs|g" CMakeLists.txt
          echo "CMakeLists.txt patched"
          grep "blenderLibLibDirRelease" CMakeLists.txt
          grep "IMPORTED_LOCATION" CMakeLists.txt | head -3
      - name: Create stubs for missing .a files
        run: |
          set -ex
          LIB_DIR="${{ github.workspace }}/blender-static-libs"
          # Parse BlenderLibNames from CMakeLists.txt and create stubs for missing .a
          cd OBlender/app/src/main/cpp
          IN_BLOCK=0
          while IFS= read -r line; do
            if echo "$line" | grep -q "SET(BlenderLibNames"; then
              IN_BLOCK=1
              continue
            fi
            if [ "$IN_BLOCK" = 1 ] && echo "$line" | grep -q ")"; then
              break
            fi
            if [ "$IN_BLOCK" = 1 ]; then
              lib=$(echo "$line" | xargs)
              if [ -n "$lib" ]; then
                libfile="$LIB_DIR/lib${lib}.a"
                if [ ! -f "$libfile" ]; then
                  echo "Creating stub: lib${lib}.a"
                  ar crs "$libfile"
                fi
              fi
            fi
          done < CMakeLists.txt
          echo "Stub creation complete"
      - name: Generate buildinfo.h stub
        run: |
          set -ex
          printf '%s\n' \
            '#define BUILD_DATE "2024-01-01"' \
            '#define BUILD_TIME "00:00:00"' \
            '#define BUILD_HASH "stub"' \
            '#define BUILD_COMMIT_TIMESTAMP 0' \
            '#define BUILD_BRANCH "stub"' \
            '#define BUILD_PLATFORM "Android"' \
            '#define BUILD_TYPE "Release"' \
            '#define BUILD_CFLAGS ""' \
            '#define BUILD_CXXFLAGS ""' \
            '#define BUILD_LINKFLAGS ""' \
            '#define BUILD_SYSTEM "CMake"' \
            > "${{ github.workspace }}/blender36/source/creator/buildinfo.h"
      - name: Recompile IlmBase libraries for NDK 27 ABI compat
        run: |
          set -ex
          WS="${{ github.workspace }}"
          # The pre-built IlmThread/Iex/Imath/OpenEXR .so files from lib-android_arm64
          # were compiled with Clang 9 (NDK r21) and are ABI-incompatible with
          # NDK 27's libc++. We recompile them from source with NDK 27.
          # Download Imath 3.0.1
          curl -sL -o /tmp/imath.tar.gz \
            "https://github.com/AcademySoftwareFoundation/Imath/archive/refs/tags/v3.0.1.tar.gz"
          tar xzf /tmp/imath.tar.gz -C /tmp
          # Build Imath as shared lib
          cmake -S /tmp/Imath-3.0.1 -B /tmp/imath-build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF \
            -DIMATH_BUILD_SHARED=ON -DIMATH_BUILD_STATIC=OFF \
            -DCMAKE_CXX_FLAGS="-fPIC -Wno-error" \
            -DCMAKE_C_FLAGS="-fPIC -Wno-error" \
            -DCMAKE_INSTALL_PREFIX="/tmp/imath-install"
          cmake --build /tmp/imath-build -j$(nproc)
          cmake --install /tmp/imath-build --prefix /tmp/imath-install
          echo "Imath 3.0.1 compiled"
          # Compile zlib for Android (needed by OpenEXR for ZIP compression)
          curl -sL -o /tmp/zlib.tar.gz \
            "https://github.com/madler/zlib/archive/refs/tags/v1.2.13.tar.gz"
          tar xzf /tmp/zlib.tar.gz -C /tmp
          cd /tmp/zlib-1.2.13
          export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++"
          export AR="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export RANLIB="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"
          ./configure --prefix=/tmp/zlib-install --static --archs="-target aarch64-linux-android24 -O2 -fPIC"
          make -j$(nproc)
          make install
          echo "zlib compiled for Android"
          cd /tmp
          # Backup original .so files before we replace them
          mkdir -p /tmp/openexr_orig /tmp/imath_orig
          cp "$WS/lib-android_arm64/OpenExr/lib/"*.so /tmp/openexr_orig/
          cp "$WS/lib-android_arm64/IMath/lib/"*.so /tmp/imath_orig/
          echo "Original .so files backed up to /tmp/*_orig/"
          # Build OpenEXR (includes IlmThread, Iex, OpenEXR, OpenEXRUtil)
          curl -sL -o /tmp/openexr.tar.gz \
            "https://github.com/AcademySoftwareFoundation/openexr/archive/refs/tags/v3.0.1.tar.gz"
          tar xzf /tmp/openexr.tar.gz -C /tmp
          cmake -S /tmp/openexr-3.0.1 -B /tmp/openexr-build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF \
            -DOPENEXR_BUILD_TOOLS=OFF -DOPENEXR_BUILD_PYTHON_LIBS=OFF \
            -DOPENEXR_FORCE_INTERNAL_IMATH=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_FLAGS="-fPIC -Wno-error" \
            -DCMAKE_C_FLAGS="-fPIC -Wno-error" \
            -DCMAKE_PREFIX_PATH="/tmp/imath-install" \
            -DImath_DIR="/tmp/imath-install/lib/cmake/Imath" \
            -DImath_ROOT="/tmp/imath-install" \
            -DZLIB_ROOT="/tmp/zlib-install" \
            -DZLIB_USE_STATIC_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="/tmp/openexr-install"
          if cmake --build /tmp/openexr-build -j$(nproc); then
            cmake --install /tmp/openexr-build --prefix /tmp/openexr-install
            echo "OpenEXR compiled successfully"
            # Copy new .so files
            find /tmp/openexr-install/lib -name "*.so" -exec cp {} "$WS/lib-android_arm64/OpenExr/lib/" \;
            find /tmp/imath-install/lib -name "*.so" -exec cp {} "$WS/lib-android_arm64/IMath/lib/" \;
            echo "Replaced OpenEXR .so files:"
            ls -la "$WS/lib-android_arm64/OpenExr/lib/" | grep -E "\.so$"
            echo "Replaced Imath .so files:"
            ls -la "$WS/lib-android_arm64/IMath/lib/" | grep -E "\.so$"
          else
            echo "=== OpenEXR build FAILED ==="
            tail -30 /tmp/openexr-build/CMakeFiles/CMakeOutput.log 2>/dev/null || true
            tail -30 /tmp/openexr-build/CMakeFiles/CMakeError.log 2>/dev/null || true
            echo "Restoring original pre-built .so files..."
            cp /tmp/openexr_orig/*.so "$WS/lib-android_arm64/OpenExr/lib/"
            cp /tmp/imath_orig/*.so "$WS/lib-android_arm64/IMath/lib/"
            echo "WARNING: Using original .so files - IlmThread ABI crash may still occur."
          fi
      - name: Patch SDK/NDK version and fix compatibility
        run: |
          set -ex
          cd OBlender
          sed -i "s|ndkVersion .*|ndkVersion '27.3.13750724'|" app/build.gradle
          echo "NDK: $(grep ndkVersion app/build.gradle)"
          # Set minSdk and targetSdk to 24 for API 24 compatibility
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 24/' app/build.gradle
          sed -i 's/minSdkVersion 28/minSdkVersion 24/' OBLFiles/build.gradle
          echo "SDK: $(grep -E 'minSdk|targetSdk' app/build.gradle)"
          # Spanish permission rationale dialog
          sed -i 's/获取读写文件权限/Permiso de almacenamiento/g' \
            app/src/main/java/com/epai/oblender/StartupActivity.java
          sed -i 's/确定/Conceder/g' \
            app/src/main/java/com/epai/oblender/StartupActivity.java
          sed -i 's/取消/Denegar/g' \
            app/src/main/java/com/epai/oblender/StartupActivity.java
          sed -i 's/存储权限获取失败,不能保存文件/Permiso denegado. No se pueden guardar archivos/g' \
            app/src/main/java/com/epai/oblender/StartupActivity.java
          echo "Permission dialog: Spanish"
          cd app/src/main/cpp
          sed -i 's|ALooper_pollAll|ALooper_pollOnce|g' native-lib.cpp
          echo "ALooper_pollAll -> ALooper_pollOnce"
          WS="${{ github.workspace }}"
          # IMB_ffmpeg_init stub (needs extern "C" for C linkage)
          printf '%s\n' '#include <stdio.h>' \
            'extern "C" void IMB_ffmpeg_init(void) {' \
            '    fprintf(stderr, "IMB_ffmpeg_init: stub\n");' \
            '}' > creator/imb_ffmpeg_stub.cc
          sed -i '/creator\/creator_signals.cc/a creator/imb_ffmpeg_stub.cc' CMakeLists.txt
          echo "IMB_ffmpeg_init stub added"
          # Auto-generate stubs for undefined AUD_* symbols from .a files
          find "${{ github.workspace }}/blender-static-libs" -name "*.a" \
            -exec nm -u {} \; 2>/dev/null \
            | grep -o 'AUD_[a-zA-Z0-9_]*' \
            | sort -u > /tmp/aud_symbols.txt
          COUNT=$(wc -l < /tmp/aud_symbols.txt)
          echo "Found $COUNT AUD_ symbols via nm"
          cd "${{ github.workspace }}/OBlender/app/src/main/cpp"
          {
            echo '#include <stdio.h>'
            echo 'extern "C" {'
            while read -r sym; do
              echo "void ${sym}() { fprintf(stderr, \"stub: ${sym}\\\\n\"); }"
            done < /tmp/aud_symbols.txt
            echo '}'
            echo 'extern "C" void PyInit_aud(void) { fprintf(stderr, "stub: PyInit_aud\\n"); }'
          } > creator/audaspace_stubs.cc
          echo "Created stubs for $COUNT AUD_ symbols + PyInit_aud"
          sed -i '/creator\/imb_ffmpeg_stub.cc/a creator/audaspace_stubs.cc' CMakeLists.txt
          echo "Audaspace stubs added"
          sed -i '/add_definitions(-DWITH_LIBMV)/a add_definitions(-DBOOST_NO_CXX98_FUNCTION_BASE)' CMakeLists.txt
          # Create OpenMP stubs instead of linking libomp.so
          printf '%s\n' \
            'extern "C" {' \
            '#include <stdio.h>' \
            'int __kmpc_global_thread_num(void *loc) { return 0; }' \
            'void __kmpc_fork_call(void *loc, int argc, void *microtask, ...) { fprintf(stderr, "stub: __kmpc_fork_call\\n"); }' \
            'void __kmpc_serialized_parallel(void *loc, int gtid) { fprintf(stderr, "stub: __kmpc_serialized_parallel\\n"); }' \
            'void __kmpc_end_serialized_parallel(void *loc, int gtid) { fprintf(stderr, "stub: __kmpc_end_serialized_parallel\\n"); }' \
            'void __kmpc_for_static_init_4(void *loc, int gtid, int *last, int *lwr, int *upr, int *stride, int incr, int chunk) { fprintf(stderr, "stub: __kmpc_for_static_init_4\\n"); }' \
            'void __kmpc_for_static_fini(void *loc, int gtid) { fprintf(stderr, "stub: __kmpc_for_static_fini\\n"); }' \
            'void __kmpc_push_num_threads(void *loc, int gtid, int num) { fprintf(stderr, "stub: __kmpc_push_num_threads\\n"); }' \
            'void __kmpc_dispatch_init_8(void *loc, int gtid, int incr, long long chunk) { fprintf(stderr, "stub: __kmpc_dispatch_init_8\\n"); }' \
            'int __kmpc_dispatch_next_8(void *loc, int gtid, int *last, long long *lwr, long long *upr, long long *stride) { fprintf(stderr, "stub: __kmpc_dispatch_next_8\\n"); return 0; }' \
            'int omp_get_max_threads(void) { return 1; }' \
            'int omp_get_thread_num(void) { return 0; }' \
            'int omp_get_num_threads(void) { return 1; }' \
            '}' > creator/omp_stubs.cc
          echo "OpenMP stubs file created"
          sed -i '/creator\/audaspace_stubs.cc/a creator/omp_stubs.cc' CMakeLists.txt
          echo "OpenMP stubs added"
          # Patch Boost headers for C++17 / NDK 27 compatibility
          # Fix std::unary_function usage in boost/container_hash/hash.hpp
          HASH="$WS/lib-android_arm64/boost/boost_1_71_0/boost/container_hash/hash.hpp"
          sed -i 's/struct hash_base : std::unary_function<T, std::size_t> {};/struct hash_base { typedef T argument_type; typedef std::size_t result_type; };/' "$HASH"
          echo "Fixed boost/container_hash/hash.hpp"
          # Fix enum-constexpr-conversion warning in boost/mpl/aux_/integral_wrapper.hpp
          IW="$WS/lib-android_arm64/boost/boost_1_71_0/boost/mpl/aux_/integral_wrapper.hpp"
          printf '%s\n' '#pragma clang diagnostic push' \
            '#pragma clang diagnostic ignored "-Wenum-constexpr-conversion"' > /tmp/iw_prefix.hpp
          cat /tmp/iw_prefix.hpp "$IW" > /tmp/iw_patched.hpp && cp /tmp/iw_patched.hpp "$IW"
          echo '#pragma clang diagnostic pop' >> "$IW"
          echo "Patched boost/mpl/aux_/integral_wrapper.hpp"
          echo "Boost compat flag added"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download Gradle wrapper JAR
        run: |
          if [ ! -f OBlender/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found, downloading from Gradle 6.5 release..."
            curl -sL -o OBlender/gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v6.5.0/gradle/wrapper/gradle-wrapper.jar"
          fi

      - name: Make gradlew executable

        run: chmod +x OBlender/gradlew

      - name: Build Debug APK (auto-signed)
        working-directory: OBlender
        run: |
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Find and strip libblender.so
        run: |
          find . -name "libblender.so" -type f 2>/dev/null | while read so_file; do
            echo "Found: $so_file"
            echo "Size before strip: $(du -h "$so_file" | cut -f1)"
            ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded "$so_file"
            echo "Size after strip: $(du -h "$so_file" | cut -f1)"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blender-apk
          path: OBlender/app/build/outputs/apk/debug/*.apk

      - name: Upload stripped libblender.so artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libblender-so-stripped
          path: |
            **/libblender.so