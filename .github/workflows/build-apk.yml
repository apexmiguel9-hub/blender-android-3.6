name: Build Blender Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and strip libblender.so
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 24
          ndk-version: r26b
          cmake-version: 3.22.1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x OBlender/gradlew

      - name: Build Release APK
        working-directory: OBlender
        run: |
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Find and strip libblender.so
        run: |
          find . -name "libblender.so" -type f 2>/dev/null | while read so_file; do
            echo "Found: $so_file"
            echo "Size before strip: $(du -h "$so_file" | cut -f1)"
            ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip --strip-unneeded "$so_file"
            echo "Size after strip: $(du -h "$so_file" | cut -f1)"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: blender-apk
          path: OBlender/app/build/outputs/apk/release/*.apk

      - name: Upload stripped libblender.so
        run: |
          find . -name "libblender.so" -type f 2>/dev/null | while read so_file; do
            mkdir -p artifacts
            cp "$so_file" artifacts/
          done
        # Note: uses upload-artifact in next step

      - name: Upload stripped libblender.so artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libblender-so-stripped
          path: |
            **/libblender.so